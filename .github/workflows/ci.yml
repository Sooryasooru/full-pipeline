name: ML CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Run training
        run: python -m src.train






name: mlops 

on:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            python-version: "3.10"

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Run tests
          run: python -m pytest

        - name: Run training 
          run: python -m src.train
